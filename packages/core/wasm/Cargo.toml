[package]
name = "fft-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM FFT processor for vue-fft-visualizer"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
realfft = "3.4"
js-sys = "0.3"

[profile.release]
# opt-level "s" beats "z" here: measured 213 KB vs 224 KB for "z" (realfft + LTO)
opt-level = "s"
lto = true
